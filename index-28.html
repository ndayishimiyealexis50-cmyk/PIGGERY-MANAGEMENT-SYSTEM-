/* ═══════════════════════════════════════════════════════════════
   FIRESTORE SECURITY RULES — deploy these in Firebase Console
   https://console.firebase.google.com → Firestore → Rules
   ═══════════════════════════════════════════════════════════════
   rules_version = '2';
   service cloud.firestore {
     match /databases/{database}/documents {

       // Farm data (pigs, feeds, sales, logs, etc.)
       match /farmiq/{doc} {
         allow read:  if request.auth != null;  // any signed-in user
         allow write: if request.auth != null;  // tighten to admin-only after testing
       }

       // User profiles — users can read any profile but only write their own
       match /users/{uid} {
         allow read:  if request.auth != null;
         allow write: if request.auth != null && request.auth.uid == uid;
       }

       // OTP codes — only the owning user can read/write their own
       match /passwordOTPs/{uid} {
         allow read, write: if request.auth != null && request.auth.uid == uid;
       }

       // Block everything else
       match /{document=**} {
         allow read, write: if false;
       }
     }
   }

/* ─── Auth helpers ─── */
const ADMIN_EMAIL = "ndayishimiyealexis50@gmail.com";

/** True if the given email belongs to the farm admin. Single source of truth. */
function isAdminEmail(email){ return !!(email && email.toLowerCase().trim() === ADMIN_EMAIL.toLowerCase()); }

/** True if a logged-in user object is the admin (by role OR by email fallback). */
function isAdminUser(user){ return !!(user && (user.role?.toLowerCase().trim()==="admin" || isAdminEmail(user.email))); }

/* ─── Profile cache (prevents double Firestore read on login) ─── */
const _profileCache = new Map();

// Get or create user profile in Firestore under users/{uid}
async function ensureUserProfile(firebaseUser, extraFields={}){
  const ref = _db.collection("users").doc(firebaseUser.uid);
  // Use cached profile if available and no extra fields need writing
  if(_profileCache.has(firebaseUser.uid) && !Object.keys(extraFields).length){
    const cached = {..._profileCache.get(firebaseUser.uid), uid: firebaseUser.uid, id: firebaseUser.uid};
    const isAdmin = firebaseUser.email?.toLowerCase() === ADMIN_EMAIL.toLowerCase();
    if(isAdmin) return {...cached, role:"admin", approved:true};
    return cached;
  }
  const snap = await ref.get();
  const isAdmin = firebaseUser.email?.toLowerCase() === ADMIN_EMAIL.toLowerCase();
  if(!snap.exists){
    const profile = {
      uid: firebaseUser.uid,
      id: firebaseUser.uid,
      email: firebaseUser.email,
      name: extraFields.name || firebaseUser.displayName || firebaseUser.email.split("@")[0],
      role: isAdmin ? "admin" : "worker",
      approved: isAdmin ? true : false,
      createdAt: new Date().toISOString(),
      ...extraFields
    };
    await ref.set(profile);
    _profileCache.set(firebaseUser.uid, profile);
    return profile;
  }
  const existing = {...snap.data(), uid: firebaseUser.uid, id: firebaseUser.uid};
  // Always fix admin profile — force role to lowercase "admin" in Firestore permanently
  if(isAdmin){
    const fixed = {...existing, role:"admin", approved:true};
    if(existing.role !== "admin" || !existing.approved){
      await ref.update({role:"admin", approved:true, email: firebaseUser.email||existing.email||null});
    }
    _profileCache.set(firebaseUser.uid, fixed);
    return fixed; // always return fixed regardless
  }
  _profileCache.set(firebaseUser.uid, existing);
  return existing;
}

async function getUserProfile(uid){
  try{
    const snap = await _db.collection("users").doc(uid).get();
    return snap.exists ? snap.data() : null;
  }catch(e){ return null; }
}

async function updateUserProfile(uid, fields){
  await _db.collection("users").doc(uid).update(fields);
}

async function getAllUserProfiles(){
  try{
    const snap = await _db.collection("users").get();
    return snap.docs.map(d=>d.data());
  }catch(e){ return []; }
}

/* ─── OTP Helpers (Password Reset via WhatsApp) ─── */
function generateOTP(){
  return Math.floor(100000 + Math.random() * 900000).toString();
}
async function storeOTP(uid, code){
  const expiresAt = new Date(Date.now() + 10 * 60 * 1000).toISOString();
  await _db.collection("passwordOTPs").doc(uid).set({
    code, expiresAt, used: false, createdAt: new Date().toISOString()
  });
}
async function verifyOTP(uid, inputCode){
  try{
    const snap = await _db.collection("passwordOTPs").doc(uid).get();
    if(!snap.exists) return {ok:false, reason:"No OTP found. Please request a new one."};
    const {code, expiresAt, used} = snap.data();
    if(used) return {ok:false, reason:"This OTP has already been used. Request a new one."};
    if(new Date() > new Date(expiresAt)) return {ok:false, reason:"OTP expired (10 min limit). Please request a new one."};
    if(code !== inputCode.trim()) return {ok:false, reason:"Incorrect OTP code. Please try again."};
    await _db.collection("passwordOTPs").doc(uid).update({used:true});
    return {ok:true};
  }catch(e){ return {ok:false, reason:"Verification error: "+e.message}; }
}

div[style*="linear-gradient(175deg"]::-webkit-scrollbar-thumb {
  background: rgba(74,222,128,.2);
  border-radius: 4px;
}

/* ── Better focus outline for accessibility ── */
button:focus-visible {
  outline: 2px solid rgba(74,222,128,.6);
  outline-offset: 2px;
}

/* ── Advance status badges ── */
.status-advance-pending {
  background: rgba(99,102,241,.1); color: #6366f1;
  border: 1px solid rgba(99,102,241,.25);
  padding: 3px 10px; border-radius: 20px; font-size: 11px; font-weight: 700;
  display: inline-block;
}

/* ── KPI card number animation ── */
@keyframes countUp {
  from { opacity: 0; transform: translateY(6px); }
  to   { opacity: 1; transform: translateY(0); }
}
.kpi-value { animation: countUp .45s cubic-bezier(.22,1,.36,1) both; }

/* ── Chart bar hover glow ── */
.chart-bar:hover { filter: brightness(1.18); cursor: default; }

/* ── Progress bar shine ── */
@keyframes barShine {
  0%   { background-position: -200% 0; }
  100% { background-position: 200% 0; }
}
.bar-shine {
  background-size: 200% 100%;
  animation: barShine 2.5s linear infinite;
}

/* ── Advance card gradient border ── */
.advance-pending-card {
  border-left: 4px solid #f59e0b !important;
  background: rgba(245,158,11,.02) !important;
}
.advance-approved-card {
  border-left: 4px solid #16a34a !important;
}
.advance-rejected-card {
  border-left: 4px solid #dc2626 !important;
}

/* ── Salary banner glow ── */
.salary-banner {
  box-shadow: 0 8px 32px rgba(0,0,0,.22), 0 0 0 1px rgba(74,222,128,.06);
}

</style>
</head>

<div id="root"></div>
<div id="pdf-frame"></div>
<!-- Firebase Firestore mode -->

<script type="text/babel" src="js/ai-components.js"></script>

<!-- 5. Salary Manager -->

<!-- 6. Admin views (App, Login, BigData, CapitalManager, PDF Generator, etc.) -->
